name: pytest

# Runs the full test suite + ruff on every PR and push to main.
# Complements the existing cla.yml (contributor licensing) and
# contradictions-benchmark.yml (single-benchmark regression guard) by
# actually running the 885+ tests in tests/ that were previously not
# executed in CI.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for the same ref so a fast follow-up push
# supersedes an older run instead of both racing to completion.
concurrency:
  group: pytest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      # Build liboqs from source. Reasons:
      #   - liboqs-python's wheel-bundled binary does not ship SLH-DSA
      #     in every build (verified 2026-07-24: 221 enabled mechanisms
      #     including Falcon + MAYO but NOT SLH-DSA under either the
      #     FIPS 205 or legacy SPHINCS+ name)
      #   - Ubuntu 24.04 (noble) does not carry liboqs-dev in its
      #     default repos as of 2026-07-24 (verified: apt says "unable
      #     to locate package")
      # Source build takes ~90s and gives us the full mechanism set
      # (both SLH-DSA-SHA2-128f and SPHINCS+-SHA2-128f-simple), which
      # our audit-chain hybrid signer relies on.
      - name: Build liboqs from source (for SLH-DSA)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --depth 1 --branch main https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cmake -S /tmp/liboqs -B /tmp/liboqs/build -GNinja -DOQS_BUILD_ONLY_LIB=ON
          cmake --build /tmp/liboqs/build --parallel
          sudo cmake --install /tmp/liboqs/build
          sudo ldconfig

      - name: Install package + all optional extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,http,hermes,continue,openai]"

      # NOTE: ruff is intentionally NOT enforced in this workflow yet. There
      # are ~745 pre-existing typing-deprecation warnings across the source
      # tree (including tests/) that need a dedicated cleanup PR before we
      # can turn ruff on as a hard gate. Once that PR lands, add:
      #     - name: Ruff check
      #       run: python -m ruff check .
      # above the pytest step. Same story for mypy (strict mode already
      # configured in pyproject.toml but not yet gated in CI).

      - name: Pytest with coverage
        # -q keeps the log short in CI logs; --tb=short shows the failing
        # line + context but not the full frame stack.
        # --cov-fail-under=69 matches the honest baseline measured on
        # 2026-07-22 (69.74% across world_model_server). Ratchet it UP
        # as coverage improves; NEVER lower this number to make a PR
        # merge. The natural raise cadence: once a feature branch adds
        # tests that lift the total by >= 1 point, bump the floor by 1.
        run: |
          python -m pytest -q --tb=short \
            --cov=world_model_server \
            --cov-report=term \
            --cov-fail-under=69
