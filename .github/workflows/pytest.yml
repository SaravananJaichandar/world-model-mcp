name: pytest

# Runs the full test suite + ruff on every PR and push to main.
# Complements the existing cla.yml (contributor licensing) and
# contradictions-benchmark.yml (single-benchmark regression guard) by
# actually running the 885+ tests in tests/ that were previously not
# executed in CI.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for the same ref so a fast follow-up push
# supersedes an older run instead of both racing to completion.
concurrency:
  group: pytest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      # NOTE (2026-07-24): The CI runner's liboqs-python does not
      # ship SLH-DSA in its bundled binary. Building liboqs from
      # source and pointing at it via LD_LIBRARY_PATH was tried
      # across three commits and did NOT fix it — liboqs-python's
      # ctypes.CDLL kept falling back to its own SLH-DSA-less
      # auto-install at ~/_oqs. Prod boxes have the full mechanism
      # set via `apt install liboqs-dev` (Debian) or a source build,
      # so the code path is fine there.
      #
      # Rather than block CI on the environment problem, the
      # hybrid_signer module now imports successfully when SLH-DSA
      # is missing and defers the check to first sign() / verify()
      # via _require_slh_dsa(). Audit-chain tests skip cleanly via
      # tests/conftest.py when SLH_DSA_AVAILABLE is False. Any
      # customer running world-model-mcp with a broken liboqs
      # cannot silently produce unsigned chain entries — every
      # attempt raises a specific, actionable RuntimeError.

      - name: Install package + all optional extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,http,hermes,continue,openai]"

      # NOTE: ruff is intentionally NOT enforced in this workflow yet. There
      # are ~745 pre-existing typing-deprecation warnings across the source
      # tree (including tests/) that need a dedicated cleanup PR before we
      # can turn ruff on as a hard gate. Once that PR lands, add:
      #     - name: Ruff check
      #       run: python -m ruff check .
      # above the pytest step. Same story for mypy (strict mode already
      # configured in pyproject.toml but not yet gated in CI).

      - name: Pytest with coverage
        # -q keeps the log short in CI logs; --tb=short shows the failing
        # line + context but not the full frame stack.
        # --cov-fail-under=69 matches the honest baseline measured on
        # 2026-07-22 (69.74% across world_model_server). Ratchet it UP
        # as coverage improves; NEVER lower this number to make a PR
        # merge. The natural raise cadence: once a feature branch adds
        # tests that lift the total by >= 1 point, bump the floor by 1.
        run: |
          python -m pytest -q --tb=short \
            --cov=world_model_server \
            --cov-report=term \
            --cov-fail-under=69
