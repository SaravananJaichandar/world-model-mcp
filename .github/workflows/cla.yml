name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, closed]

# Explicit least-privilege permissions per contributor-assistant docs.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Trigger the sign flow when a contributor comments the sign phrase,
        # or the check on every PR update against `main`.
        if: >
          (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
          || (github.event_name == 'pull_request_target')
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The signature ledger lives in-tree so relicensing later has a
          # clean audit trail. Path is relative to the repo root by default.
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/SaravananJaichandar/world-model-mcp/blob/main/CLA.md"
          branch: "main"
          allowlist: dependabot[bot],SaravananJaichandar
          remote-organization-name: SaravananJaichandar
          remote-repository-name: world-model-mcp
          create-file-commit-message: "chore(cla): create CLA signature file"
          signed-commit-message: "chore(cla): $contributorName signed the CLA in #$pullRequestNo"
          custom-notsigned-prcomment: >
            Thank you for the contribution. Before we can merge, please sign
            our [Contributor License Agreement](https://github.com/SaravananJaichandar/world-model-mcp/blob/main/CLA.md)
            by posting the exact comment below in this pull request.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA."
